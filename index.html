<div id="pokemon-page">
  <header id="pokemon-page-header">
    <div id="header-contents-left">
      <div id="arrow-back"></div>
      <div id="pokemon-image"></div>
      <div id="pokemon-name-and-labels">
        <h2 id="pokemon-name">Charmander</h2>
        <div id="labels-container">
          <div class="label" id="generation-label">Generation 1</div>
          <div class="label trainer-label" id="trainer-name-label">Trainer Ash</div>
          <div class="label trainer-label" id="trainer-skill-label">Attack</div>
        </div>
      </div>
    </div>
    <div id="header-contents-right">
      <div class="pokemon-points-and-placement seperator">
        <h2 id="pokemon-top-points">1333</h2>
        <p>Top points</p>
      </div>
      <div class="pokemon-points-and-placement seperator">
        <h2 id="pokemon-total-points">6380</h2>
        <p>Total points</p>
      </div>
      <div class="pokemon-points-and-placement">
        <h2 id="pokemon-top-placement">#2</h2>
        <p>Top placement</p>
      </div>
    </div>
  </header>
</div>
